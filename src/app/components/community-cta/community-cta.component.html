<section class="community-cta-container">
  
  <div class="cta-card">
    <div class="card-border-top"></div>
    
    <div class="card-body">
      <h2>Join our community.</h2>
      
      <form (ngSubmit)="onSubmit()">
        <label for="email">Email address*</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Join our online community ..." 
          required>
        
        <button type="submit" class="btn-yellow">Sign up</button>
      </form>
    </div>
  </div>
    <div style="position: relative; font-size: 25px; color: #fff;">Footer text</div>
</section>
