<header class="floating-navbar" [class.hidden]="isScrolled">
  <div class="container">
    <a routerLink="/" class="logo-link" (click)="closeMobileMenu()">
      <img src="/assets/images/bruversPurple.png" width="60" alt="logo">
    </a>

    <button class="mobile-menu-toggle" (click)="toggleMobileMenu($event)" [class.open]="isMobileMenuOpen">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <nav class="nav-links" [class.mobile-active]="isMobileMenuOpen">
      <div *ngFor="let item of navItems" class="nav-item-wrapper">
        <ng-container *ngIf="item.dropdown; else simpleLink">
          <div class="nav-item" (click)="toggleSubmenu(item, $event)" [class.active]="item.isSubmenuOpen">
            {{ item.name }}
            <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          <div class="dropdown-menu" [class.show]="item.isSubmenuOpen">
            <a *ngFor="let subItem of item.dropdown" 
               [routerLink]="subItem.link" 
               class="dropdown-item"
               (click)="closeMobileMenu()">
              {{ subItem.name }}
            </a>
          </div>
        </ng-container>

        <ng-template #simpleLink>
          <a [routerLink]="item.link" class="nav-item" routerLinkActive="active-link" (click)="closeMobileMenu()">
            {{ item.name }}
          </a>
        </ng-template>
      </div>
    </nav>
  </div>
</header>

<div class="menu-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
