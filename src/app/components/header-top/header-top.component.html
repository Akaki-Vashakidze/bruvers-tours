<header class="navbar" [class.sticky-visible]="isSticky">
  <div class="container">
    <a routerLink="/" class="logo-link">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="5.5" cy="17.5" r="3.5"></circle>
        <circle cx="18.5" cy="17.5" r="3.5"></circle>
        <path d="M12 17.5V11l-3-3 3-3h5l3 3"></path>
      </svg>
      <span class="logo-text">Velocita<span class="highlight">Tours</span></span>
    </a>

    <nav class="nav-links">
      <div *ngFor="let item of navItems" class="nav-item-wrapper">
        <ng-container *ngIf="item.dropdown; else simpleLink">
          <div class="nav-item dropdown-toggle">
            {{ item.name }}
            <div class="dropdown-menu">
              <a *ngFor="let subItem of item.dropdown" 
                 [routerLink]="subItem.link" 
                 class="dropdown-item">
                {{ subItem.name }}
              </a>
            </div>
          </div>
        </ng-container>

        <ng-template #simpleLink>
          <a [routerLink]="item.link" class="nav-item" routerLinkActive="active-link">
            {{ item.name }}
          </a>
        </ng-template>
      </div>

      <a href="#" class="nav-item search-icon" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </a>
    </nav>
  </div>
</header>
